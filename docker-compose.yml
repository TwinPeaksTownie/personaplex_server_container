services:
  personaplex:
    build:
      context: .
      dockerfile: Dockerfile.unified
    ports:
      - "5173:5173"
      - "8080:8080"
    environment:
      - NO_TORCH_COMPILE=1
      - HF_HOME=/app/.cache/huggingface
      - HF_TOKEN=${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./voices:/app/voices
      - huggingface-cache:/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:5173", "--insecure"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  huggingface-cache:
    driver: local
